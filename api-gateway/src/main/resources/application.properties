# ============================================================
# CONFIGURACIÓN DEL API GATEWAY
# ============================================================
# Este archivo define cómo el Gateway redirige las peticiones
# HTTP hacia cada microservicio según el path (ruta URL).
# Todas las peticiones del cliente llegan aquí primero.
# ============================================================

# Puerto donde escucha el Gateway. El cliente SIEMPRE usa este puerto.
# Ejemplo: http://localhost:8080/api/v1/auth/login
server.port=8080

# Nombre con que este servicio se registra en Eureka.
spring.application.name=api-gateway

# ── Conexión con Eureka ────────────────────────────────────
# Dirección del servidor Eureka. El Gateway consulta aquí
# para saber dónde está cada microservicio (IP y puerto).
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Clave secreta para validar tokens JWT en el Gateway.
# Debe ser IDÉNTICA a la usada en auth-service.
jwt.secret=unaClaveSecretaMuyLargaParaQueSeaSegura123456

# ── RUTAS DEL GATEWAY ─────────────────────────────────────
# Cada ruta define:
#   id      = nombre identificador de la ruta (cualquiera)
#   uri     = destino usando lb:// (load balancer de Eureka)
#             "lb://auth-service" = busca en Eureka el servicio
#             llamado "auth-service" y balancea la carga
#   predicates = condición para activar la ruta
#                Path=/api/v1/auth/** significa cualquier URL
#                que EMPIECE con /api/v1/auth/

# RUTA 0: Todo lo que empiece con /api/v1/auth/ va al auth-service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# RUTA 1: Todo lo de /api/v1/usuarios/ va al usuario-service
spring.cloud.gateway.routes[1].id=usuario-service
spring.cloud.gateway.routes[1].uri=lb://usuario-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/usuarios/**

# RUTA 2: Todo lo de /api/v1/propiedades/ va al propiedad-service
spring.cloud.gateway.routes[2].id=propiedad-service
spring.cloud.gateway.routes[2].uri=lb://propiedad-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/propiedades/**

# RUTA 3: Todo lo de /api/v1/reservas/ va al reserva-service
spring.cloud.gateway.routes[3].id=reserva-service
spring.cloud.gateway.routes[3].uri=lb://reserva-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/reservas/**

# RUTA 4: Todo lo de /api/v1/resenas/ va al resena-service
spring.cloud.gateway.routes[4].id=resena-service
spring.cloud.gateway.routes[4].uri=lb://resena-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/resenas/**

# RUTA 5: Todo lo de /api/v1/busqueda/ va al busqueda-service
spring.cloud.gateway.routes[5].id=busqueda-service
spring.cloud.gateway.routes[5].uri=lb://busqueda-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/busqueda/**

# RUTA 6: Todo lo de /api/v1/notificaciones/ va al notificacion-service
spring.cloud.gateway.routes[6].id=notificacion-service
spring.cloud.gateway.routes[6].uri=lb://notificacion-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/notificaciones/**

# RUTA 7: Todo lo de /api/v1/imagenes/ va al imagen-service
spring.cloud.gateway.routes[7].id=imagen-service
spring.cloud.gateway.routes[7].uri=lb://imagen-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/imagenes/**

# RUTA 8: Todo lo de /api/v1/reportes/ va al reporte-service
spring.cloud.gateway.routes[8].id=reporte-service
spring.cloud.gateway.routes[8].uri=lb://reporte-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/reportes/**

# ── Logs ──────────────────────────────────────────────────
# DEBUG en Gateway muestra qué ruta se activó para cada petición.
# Muy útil para depurar errores de redirección.
logging.level.org.springframework.cloud.gateway=DEBUG