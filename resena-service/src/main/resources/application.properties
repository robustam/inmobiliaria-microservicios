# ============================================================
# RESEÑA SERVICE - CONFIGURACIÓN DE LA APLICACIÓN
# ============================================================
# Gestiona evaluaciones y calificaciones de propiedades.
# Se integra con propiedad-service via Feign para verificar existencia.
# Puerto: 8084 | BD: resena_db
# ============================================================

# Puerto de este microservicio.
server.port=8084

# Nombre en Eureka. También se usa en la ruta del Gateway: lb://resena-service
spring.application.name=resena-service

# ── Eureka ───────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── Base de datos MySQL ──────────────────────────────────────
# resena_db: BD exclusiva para almacenar reseñas y calificaciones.
spring.datasource.url=jdbc:mysql://localhost:3306/resena_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Logging ──────────────────────────────────────────────────
logging.level.com.inmobiliaria=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# -- Swagger / OpenAPI ----------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method