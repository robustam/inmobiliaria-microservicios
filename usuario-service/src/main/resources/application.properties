# ============================================================
# USUARIO SERVICE - CONFIGURACIÓN DE LA APLICACIÓN
# ============================================================
# Gestiona perfiles de usuarios (arrendatarios y propietarios).
# Puerto: 8082 | BD: usuario_db
# ============================================================

# Puerto de este microservicio.
server.port=8082

# Nombre con el que se registra en Eureka.
spring.application.name=usuario-service

# ── Eureka ───────────────────────────────────────────────────
# Dirección del servidor Eureka para registrarse y descubrir otros servicios.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── Base de datos MySQL ──────────────────────────────────────
# usuario_db: base de datos exclusiva de este microservicio.
# Separación de datos por servicio (principio de microservicios).
spring.datasource.url=jdbc:mysql://localhost:3306/usuario_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
# update: crea/actualiza la tabla "usuarios" según la entidad Usuario.java.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Logging ──────────────────────────────────────────────────
logging.level.com.inmobiliaria=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method