# ============================================================
# PROPIEDAD SERVICE - CONFIGURACIÓN DE LA APLICACIÓN
# ============================================================
# Microservicio central del sistema inmobiliario.
# Gestiona el catálogo de propiedades disponibles para arriendo.
# Puerto: 8086 | BD: propiedad_db
# ============================================================

# Puerto donde escucha este microservicio.
server.port=8086

# Nombre con el que se registra en Eureka.
# El API Gateway lo enruta con lb://propiedad-service.
spring.application.name=propiedad-service

# ── Base de datos MySQL ──────────────────────────────────────
# propiedad_db: base de datos EXCLUSIVA de este microservicio.
# Cada microservicio tiene su propia BD independiente (patrón de microservicios).
spring.datasource.url=jdbc:mysql://localhost:3306/propiedad_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
# Driver JDBC de MySQL (clase Java que sabe hablar el protocolo MySQL).
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
# update: Hibernate crea la tabla "propiedades" si no existe,
# y agrega columnas nuevas si se modificó la entidad Propiedad.java.
spring.jpa.hibernate.ddl-auto=update
# Muestra en consola el SQL generado (útil para aprender y depurar).
spring.jpa.show-sql=true
# MySQL8Dialect: optimizaciones para MySQL versión 8+.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Eureka (Service Discovery) ───────────────────────────────
# Al iniciar, este servicio se registra en Eureka para ser descubierto
# por el Gateway y por otros microservicios (reserva, resena, busqueda, reporte).
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── Logging ──────────────────────────────────────────────────
# Nivel DEBUG para nuestro código: muestra log.debug() y log.info().
logging.level.com.inmobiliaria=DEBUG
# Nivel INFO para Spring Web: muestra peticiones HTTP entrantes.
logging.level.org.springframework.web=INFO
# Muestra el SQL generado por Hibernate con sus parámetros.
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method