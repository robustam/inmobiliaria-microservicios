# ============================================================
# NOTIFICACIÓN SERVICE - CONFIGURACIÓN DE LA APLICACIÓN
# ============================================================
# Sistema de alertas y mensajes para usuarios de la plataforma.
# Puerto: 8087 | BD: notificacion_db
# ============================================================

# Puerto del microservicio.
server.port=8087

# Nombre en Eureka. El Gateway lo enruta con lb://notificacion-service.
spring.application.name=notificacion-service

# ── Base de datos MySQL ──────────────────────────────────────
# notificacion_db: BD exclusiva para almacenar notificaciones de usuarios.
spring.datasource.url=jdbc:mysql://localhost:3306/notificacion_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
# Crea la tabla "notificaciones" si no existe al arrancar.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Eureka ───────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── Logging ──────────────────────────────────────────────────
logging.level.com.inmobiliaria=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE