# ============================================================
# CONFIGURACIÓN DEL SERVIDOR EUREKA
# ============================================================
# Este archivo define cómo se comporta el servidor de registro.
# Spring Boot lo lee automáticamente al iniciar la aplicación.
# ============================================================

# Puerto donde escuchará el servidor Eureka.
# Al abrir http://localhost:8761 verás el panel de control
# con todos los microservicios registrados.
server.port=8761

# Nombre de esta aplicación en el ecosistema de microservicios.
# Este nombre aparece en los logs y en el panel de Eureka.
spring.application.name=eureka-server

# false = el servidor Eureka NO se registra a sí mismo como cliente.
# Solo los microservicios clientes deben registrarse, no el servidor.
eureka.client.register-with-eureka=false

# false = el servidor Eureka NO intenta obtener el listado de servicios
# de otro servidor Eureka. No hay réplica en este proyecto (solo 1 servidor).
eureka.client.fetch-registry=false

# Nombre del host donde corre Eureka. En desarrollo local siempre es localhost.
eureka.instance.hostname=localhost

# Tiempo de espera al iniciar el servidor antes de aceptar registros.
# 0 = no espera, acepta registros inmediatamente al arrancar.
eureka.server.wait-time-in-ms-when-sync-empty=0

# ── Configuración de Logs ──────────────────────────────────
# INFO = muestra mensajes de información general de Eureka.
logging.level.com.netflix.eureka=INFO
# INFO = muestra mensajes del proceso de descubrimiento de servicios.
logging.level.com.netflix.discovery=INFO
# INFO = muestra mensajes de Spring Cloud (registro, heartbeat, etc.).
logging.level.org.springframework.cloud=INFO