# ============================================================
# RESERVA SERVICE - CONFIGURACIÓN DE LA APLICACIÓN
# ============================================================
# Gestiona reservas de arriendo y se comunica con propiedad-service.
# Puerto: 8083 | BD: reserva_db
# ============================================================

# Puerto de este microservicio.
server.port=8083

# Nombre en Eureka (usado por Gateway y otros servicios para encontrarlo).
spring.application.name=reserva-service

# ── Base de datos MySQL ──────────────────────────────────────
# reserva_db: BD exclusiva de este microservicio.
spring.datasource.url=jdbc:mysql://localhost:3306/reserva_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Eureka ───────────────────────────────────────────────────
# Al registrarse, reserva-service puede llamar a propiedad-service por nombre.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── Feign: usar OkHttp en lugar de HttpURLConnection ─────────
# HttpURLConnection de Java no soporta el método PATCH.
# OkHttp sí lo soporta y es necesario para llamar a PATCH /propiedades/{id}/estado.
spring.cloud.openfeign.okhttp.enabled=true

# ── Scheduler: liberación automática de propiedades vencidas ─
# Cron: segundos minutos horas día-mes mes día-semana
# Por defecto: todos los días a medianoche (00:00:00)
# Para pruebas rápidas usar: 0 */1 * * * * (cada minuto)
reserva.scheduler.cron=0 0 0 * * *

# ── Logging ──────────────────────────────────────────────────
logging.level.com.inmobiliaria=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# -- Swagger / OpenAPI ----------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
