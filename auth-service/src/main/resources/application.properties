
# ============================================================
# AUTH SERVICE - CONFIGURACIÓN DE LA APLICACIÓN
# ============================================================
# Este archivo configura el microservicio de autenticación.
# Spring Boot lo carga automáticamente al iniciar la aplicación.
# Formato: clave=valor (sin espacios alrededor del =)
# ============================================================

# ── Puerto del servidor ──────────────────────────────────────
# El microservicio escucha en este puerto.
# Cada microservicio usa un puerto diferente para no colisionar:
#   8080 = API Gateway
#   8081 = auth-service     ← este servicio
#   8082 = propiedad-service
#   8083 = usuario-service
#   ...
server.port=8081

# ── Nombre de la aplicación ──────────────────────────────────
# Con este nombre se registra en Eureka (servidor de descubrimiento).
# El API Gateway usa este nombre para encontrar el servicio (lb://auth-service).
# IMPORTANTE: debe coincidir con el nombre en el Gateway route.
spring.application.name=auth-service

# ── Base de datos MySQL ──────────────────────────────────────
# URL de conexión JDBC a MySQL en el puerto estándar 3306.
# Parámetros:
#   createDatabaseIfNotExist=true → crea "auth_db" si no existe (conveniente para desarrollo)
#   useSSL=false                  → desactiva SSL (OK en entorno local)
#   serverTimezone=UTC            → zona horaria del servidor MySQL
#   characterEncoding=UTF-8       → soporte para acentos y caracteres especiales (español)
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8

# Usuario y contraseña de MySQL.
# En producción estos valores deberían estar en variables de entorno, no en el código.
spring.datasource.username=root
spring.datasource.password=root

# ── JPA / Hibernate ──────────────────────────────────────────
# Estrategia de creación/actualización de tablas al iniciar:
#   update = crea la tabla si no existe, agrega columnas nuevas si se agregaron campos.
#   create = elimina y recrea la tabla cada vez (¡borra todos los datos!)
#   none   = no toca la estructura de la BD (para producción)
spring.jpa.hibernate.ddl-auto=update

# show-sql=true: imprime en consola cada consulta SQL generada por Hibernate.
# Útil para depuración. Deshabilitar en producción para no saturar los logs.
spring.jpa.show-sql=true

# dialect: le indica a Hibernate qué variante de SQL usar.
# MySQLDialect genera SQL compatible con MySQL (funciones, tipos de datos, etc.)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Eureka (Service Discovery) ───────────────────────────────
# Dirección del servidor Eureka donde este servicio se registra.
# Al iniciar, auth-service envía su nombre, IP y puerto a Eureka.
# El Gateway consulta Eureka para saber dónde está auth-service.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── JWT (JSON Web Token) ─────────────────────────────────────
# Clave secreta para firmar los tokens JWT con algoritmo HMAC-SHA256.
# IMPORTANTE: en producción debe ser una cadena aleatoria larga (min. 256 bits).
# NUNCA compartir esta clave ni subirla a repositorios públicos.
jwt.secret=unaClaveSecretaMuyLargaParaQueSeaSegura123456

# Tiempo de vida del token en milisegundos.
# 86400000 ms = 86400 segundos = 1440 minutos = 24 horas
# Después de 24h el token expira y el usuario debe hacer login de nuevo.
jwt.expiration=86400000

# ── Logging (Niveles de registro) ────────────────────────────
# Controla qué tan detallados son los mensajes en la consola.
# Niveles (de más a menos detallado): TRACE > DEBUG > INFO > WARN > ERROR
#
# Nuestro código (com.inmobiliaria) en nivel DEBUG:
# → muestra log.debug(), log.info(), log.warn(), log.error()
logging.level.com.inmobiliaria=DEBUG

# Spring Web en INFO: solo muestra mensajes importantes del framework.
logging.level.org.springframework.web=INFO

# Hibernate SQL en DEBUG: muestra las consultas SQL generadas.
logging.level.org.hibernate.SQL=DEBUG

# BasicBinder en TRACE: muestra los parámetros exactos de cada consulta SQL.
# Ejemplo: binding parameter [1] as [VARCHAR] - [juan123]
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method