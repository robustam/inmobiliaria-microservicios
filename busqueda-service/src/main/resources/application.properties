# ============================================================
# BÚSQUEDA SERVICE - CONFIGURACIÓN DE LA APLICACIÓN
# ============================================================
# Servicio proxy/agregador para búsqueda de propiedades de arriendo.
# Delega consultas a propiedad-service via Feign.
# Puerto: 8089
# ============================================================

# Puerto de este microservicio.
server.port=8089

# Nombre en Eureka (el Gateway lo enruta con lb://busqueda-service).
spring.application.name=busqueda-service

# ── Base de datos MySQL ──────────────────────────────────────
# busqueda_db existe por consistencia pero no se usa activamente.
# Este servicio no tiene entidades propias (todo viene de propiedad-service).
spring.datasource.url=jdbc:mysql://localhost:3306/busqueda_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Eureka ───────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── Logging ──────────────────────────────────────────────────
logging.level.com.inmobiliaria=DEBUG
logging.level.org.springframework.web=INFO
# feign=DEBUG: muestra las peticiones HTTP que hace el cliente Feign.
# Útil para ver las llamadas a propiedad-service con todos sus parámetros.
logging.level.feign=DEBUG