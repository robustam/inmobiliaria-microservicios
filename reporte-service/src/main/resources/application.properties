# ============================================================
# REPORTE SERVICE - CONFIGURACIÓN DE LA APLICACIÓN
# ============================================================
# Genera reportes estadísticos consultando propiedad-service y reserva-service.
# Puerto: 8085 | BD: reporte_db
# ============================================================

# Puerto del microservicio.
server.port=8085

# Nombre en Eureka. El Gateway lo enruta con lb://reporte-service.
spring.application.name=reporte-service

# ── Base de datos MySQL ──────────────────────────────────────
# reporte_db: BD exclusiva para guardar el historial de reportes generados.
spring.datasource.url=jdbc:mysql://localhost:3306/reporte_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Eureka ───────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── Logging ──────────────────────────────────────────────────
logging.level.com.inmobiliaria=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
# feign=DEBUG: muestra las llamadas HTTP a propiedad-service y reserva-service.
logging.level.feign=DEBUG
# -- Swagger / OpenAPI ----------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
