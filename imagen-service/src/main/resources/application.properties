# ============================================================
# IMAGEN SERVICE - CONFIGURACIÓN DE LA APLICACIÓN
# ============================================================
# Gestiona metadatos de imágenes de propiedades (URL, nombre, tamaño).
# Puerto: 8088 | BD: imagen_db
# ============================================================

# Puerto del microservicio.
server.port=8088

# Nombre en Eureka.
spring.application.name=imagen-service

# ── Base de datos MySQL ──────────────────────────────────────
# imagen_db: BD exclusiva para almacenar metadatos de imágenes.
spring.datasource.url=jdbc:mysql://localhost:3306/imagen_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Eureka ───────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── Logging ──────────────────────────────────────────────────
logging.level.com.inmobiliaria=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# -- Swagger / OpenAPI ----------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
